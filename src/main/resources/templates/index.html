<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coucal Feeds</title>
    <link rel="stylesheet" href="../public/main.css" th:href="@{/main.css}">
    <script src="https://unpkg.com/htmx.org@1.9.6"></script>
    <script src="https://unpkg.com/hyperscript.org@0.9.11"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900">
    <div class="min-h-screen">
        <header class="bg-white dark:bg-gray-800 shadow-md">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                <div class="flex items-center justify-between">
                    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">
                        Coucal Inbox
                         <span class="text-indigo-500">Beta</span>
                    </h1>
                    <nav class="space-x-4">
                        <button hx-get="/directory/"
                                hx-trigger="click"
                                hx-target="#main-content"
                                class="px-4 py-2 text-sm font-medium text-gray-700 bg-white dark:bg-gray-700 dark:text-gray-200 rounded-md hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                            Directory
                        </button>
                        <button hx-get="/messageThreads/recent"
                                hx-trigger="click"
                                hx-target="#main-content"
                                class="px-4 py-2 text-sm font-medium text-gray-700 bg-white dark:bg-gray-700 dark:text-gray-200 rounded-md hover:bg-gray-50 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                            Recent Threads
                        </button>
                        <button hx-get="/chat"
                                hx-trigger="click"
                                hx-target="#modal-content"
                                _="on click remove .hidden from #modal"
                                class="px-4 py-2 text-sm font-medium text-white bg-gradient-to-r from-indigo-500 to-purple-600 rounded-md hover:from-indigo-600 hover:to-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all duration-150 ease-in-out">
                            AI Chat
                        </button>
                    </nav>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div id="main-content"
                 hx-get="/feeds/"
                 hx-trigger="load"
                 class="bg-white dark:bg-gray-800 shadow rounded-lg p-6">
                <!-- Content will be loaded here -->
                <div class="animate-pulse flex space-x-4">
                    <div class="flex-1 space-y-4 py-1">
                        <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-3/4"></div>
                        <div class="space-y-2">
                            <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded"></div>
                            <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-5/6"></div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <div id="modal" class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity hidden" _="on closeModal hide me">
            <div class="fixed inset-0 z-10 overflow-y-auto">
                <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
                    <div class="relative transform overflow-hidden rounded-lg bg-white dark:bg-gray-800 px-4 pb-4 pt-5 text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg sm:p-6">
                        <div class="absolute right-0 top-0 hidden pr-4 pt-4 sm:block">
                            <button type="button"
                                    class="rounded-md bg-white dark:bg-gray-800 text-gray-400 hover:text-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
                                    _="on click trigger closeModal">
                                <span class="sr-only">Close</span>
                                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </button>
                        </div>
                        <div id="modal-content"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button type="button" class="fixed left-1/2 transform -translate-x-1/2 bottom-1 z-99 hidden opacity-30 hover:opacity-100 transition-opacity duration-300 text-white bg-indigo-600 hover:bg-indigo-500 focus:ring-4 focus:outline-none focus:ring-blue-300 font-medium rounded-full text-sm p-2.5 text-center inline-flex items-center me-2 dark:bg-blue-600 dark:hover:bg-blue-700 dark:focus:ring-blue-800"
            onclick="topFunction()" id="myBtn" title="Go to top">
        <th:block th:replace="~{fragments/ui/icon :: up}"></th:block>
        <span class="sr-only">Go to top</span>
    </button>
    <script>
        // Get the button:
        let mybutton = document.getElementById("myBtn");

        // When the user scrolls down 20px from the top of the document, show the button
        window.onscroll = function() {scrollFunction()};

        function scrollFunction() {
          if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) {
            mybutton.style.display = "block";
          } else {
            mybutton.style.display = "none";
          }
        }

        // When the user clicks on the button, scroll to the top of the document
        function topFunction() {
          document.body.scrollTop = 0; // For Safari
          /*document.documentElement.scrollTop = 0; // For Chrome, Firefox, IE and Opera*/
          window.scroll({top: 0, behavior: "smooth"})
        }
    </script>

    <script type="text/javascript" th:src="@{/webjars/htmx.org/dist/htmx.min.js}"></script>
    <script th:src="@{/webjars/flowbite/dist/flowbite.min.js}"
            src="https://cdn.jsdelivr.net/npm/flowbite@3.0.0/dist/flowbite.js/flowbite.min.js"></script>
    <script>
        htmx.on("htmx:beforeRequest", (event) => {
            const elt = event.detail.elt
            if (event.detail.boosted === true && elt.tagName === "A" && !elt.hasAttribute("hx-swap")) {
                elt.setAttribute("hx-swap", "transition:true")
            }
        })
    </script>
</body>
</html>
