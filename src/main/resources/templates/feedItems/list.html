
<div class="mb-6">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow p-4">
        <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
            <!-- Search/Filter Input -->
            <div class="relative flex-grow max-w-md">
                <input type="text"
                       id="filter-input"
                       name="q"
                       placeholder="Filter items..."
                       class="w-full pl-10 pr-4 py-2 border rounded-lg dark:bg-gray-700 dark:border-gray-600 dark:text-white"
                       hx-post="/feedItems/filter"
                       hx-trigger="keyup changed delay:500ms"
                       hx-target="#feed-items-container">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="h-5 w-5 text-gray-400" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
                    </svg>
                </div>
            </div>

            <div class="flex items-center space-x-4">
                <!-- Layout Toggle -->
                <div class="flex rounded-lg shadow-sm">
                    <button type="button"
                            class="px-4 py-2 text-sm font-medium rounded-l-lg bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 text-gray-900 dark:text-white hover:bg-gray-50 dark:hover:bg-gray-600"
                            hx-get="/feedItems/list?layout=grid"
                            hx-target="#feed-items-container">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                        </svg>
                    </button>
                    <button type="button"
                            class="px-4 py-2 text-sm font-medium rounded-r-lg bg-white dark:bg-gray-700 border border-l-0 border-gray-200 dark:border-gray-600 text-gray-900 dark:text-white hover:bg-gray-50 dark:hover:bg-gray-600"
                            hx-get="/feedItems/list?layout=list"
                            hx-target="#feed-items-container">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                        </svg>
                    </button>
                </div>

                <!-- Sort Dropdown -->
                <div class="relative">
                    <button type="button"
                            class="inline-flex items-center px-4 py-2 text-sm font-medium bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg text-gray-900 dark:text-white hover:bg-gray-50 dark:hover:bg-gray-600"
                            id="sort-menu-button"
                            aria-expanded="false"
                            aria-haspopup="true">
                        Sort
                        <svg class="-mr-1 ml-2 h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                    </button>
                    <div class="hidden absolute right-0 z-10 mt-2 w-48 origin-top-right rounded-md bg-white dark:bg-gray-700 shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none"
                         role="menu"
                         id="sort-menu"
                         >
                        <div class="py-1" role="none">
                            <button class="text-gray-700 dark:text-gray-200 block px-4 py-2 text-sm w-full text-left hover:bg-gray-100 dark:hover:bg-gray-600"
                                    role="menuitem"
                                    hx-get="/feedItems/list?sort=date-desc"
                                    hx-target="#feed-items-container">
                                Newest first
                            </button>
                            <button class="text-gray-700 dark:text-gray-200 block px-4 py-2 text-sm w-full text-left hover:bg-gray-100 dark:hover:bg-gray-600"
                                    role="menuitem"
                                    hx-get="/feedItems/list?sort=date-asc"
                                    hx-target="#feed-items-container">
                                Oldest first
                            </button>
                            <button class="text-gray-700 dark:text-gray-200 block px-4 py-2 text-sm w-full text-left hover:bg-gray-100 dark:hover:bg-gray-600"
                                    role="menuitem"
                                    hx-get="/feedItems/list?sort=title"
                                    hx-target="#feed-items-container">
                                Title A-Z
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="feed-items-container">
    <table th:replace="~{fragments/ui/table :: feed-items}"></table>
</div>
