<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<div class="p-4 space-y-4">
    <!-- Add Category Button -->
    <div class="flex justify-end">
        <button type="button"
                class="inline-flex items-center rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 dark:bg-indigo-500 dark:hover:bg-indigo-400"
                hx-get="/categories/new"
                hx-target="#modal-content"
                _="on click remove .hidden from #modal">
            <svg class="-ml-0.5 mr-1.5 h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V7z" clip-rule="evenodd"/>
            </svg>
            Add Category
        </button>
    </div>

    <!-- Categories List -->
    <div class="bg-white dark:bg-gray-800 shadow-md rounded-lg overflow-hidden">
        <ul class="divide-y divide-gray-200 dark:divide-gray-700">
            <li th:each="category : ${categories}"
                class="hover:bg-gray-50 dark:hover:bg-gray-700 transition duration-150 ease-in-out">
                <div class="px-4 py-4 sm:px-6">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <div class="flex-shrink-0">
                                <div class="h-10 w-10 rounded-lg bg-indigo-100 dark:bg-indigo-900 flex items-center justify-center">
                                    <svg class="h-6 w-6 text-indigo-600 dark:text-indigo-300" viewBox="0 0 20 20" fill="currentColor">
                                        <path d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zM5 11a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5z"/>
                                        <path d="M11 5a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V5zM11 13a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/>
                                    </svg>
                                </div>
                            </div>
                            <div class="ml-4">
                                <h3 class="text-lg font-medium leading-6 text-gray-900 dark:text-white"
                                    th:text="${category.name}">
                                </h3>
                                <div class="mt-1 flex items-center">
                                    <span class="text-sm text-gray-500 dark:text-gray-400"
                                          th:text="${#lists.size(category.feedItems)} + ' items'">
                                    </span>
                                    <span class="mx-2 text-gray-400">•</span>
<!--                                    <span class="text-sm text-gray-500 dark:text-gray-400"-->
<!--                                          th:with="itemCount=${#aggregates.sum(category.feedItems.![category.feedItems.size()])}"-->
<!--                                          th:text="${itemCount} + ' items'">-->
<!--                                    </span>-->
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center space-x-2">
                            <button type="button"
                                    class="inline-flex items-center p-2 rounded-full text-gray-400 hover:text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
                                    th:hx-get="@{/categories/{id}/edit(id=${category.uri})}"
                                    hx-target="#modal-content"
                                    _="on click remove .hidden from #modal">
                                <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                    <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/>
                                </svg>
                            </button>
                            <button type="button"
                                    class="inline-flex items-center p-2 rounded-full text-gray-400 hover:text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
                                    th:hx-get="@{/categories/{id}(id=${category.uri})}"
                                    hx-target="#main-content">
                                <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </li>
            <li th:if="${#lists.isEmpty(categories)}" class="px-4 py-6 text-center text-gray-500 dark:text-gray-400">
                <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"/>
                </svg>
                <p class="mt-2 text-sm">No categories yet. Click "Add Category" to create one.</p>
            </li>
        </ul>
    </div>
</div>
