<div class="p-4 space-y-4">
    <!-- Add Feed Toolbar -->
    <div class="bg-white dark:bg-gray-800 shadow-md rounded-lg overflow-hidden">
        <div class="p-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <form hx-post="/feeds/"
                  hx-target="#main-content"
                  class="grow flex gap-2 items-center">
                <div class="grow">
                    <label for="feed-url" class="sr-only">Feed URL</label>
                    <div class="relative">
                        <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3">
                            <svg class="h-5 w-5 text-gray-400" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M5 3a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V5a2 2 0 00-2-2H5zM5 11a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2v-2a2 2 0 00-2-2H5zM11 5a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V5zM14 11a1 1 0 011 1v1h1a1 1 0 110 2h-1v1a1 1 0 11-2 0v-1h-1a1 1 0 110-2h1v-1a1 1 0 011-1z"/>
                            </svg>
                        </div>
                        <input type="url"
                               name="feedUrl"
                               id="feed-url"
                               required
                               placeholder="Enter feed or website URL..."
                               class="block w-full rounded-md border-0 py-2 pl-10 pr-4 text-gray-900 dark:text-white ring-1 ring-inset ring-gray-300 dark:ring-gray-600 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 dark:bg-gray-700 dark:focus:ring-indigo-500 sm:text-sm sm:leading-6">
                    </div>
                </div>
                <button type="submit"
                        class="inline-flex items-center rounded-md bg-indigo-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 dark:bg-indigo-500 dark:hover:bg-indigo-400">
                    <svg class="-ml-0.5 mr-1.5 h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-11a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V7z" clip-rule="evenodd"/>
                    </svg>
                    Add Feed
                </button>
            </form>

            <div class="flex justify-end space-x-2">
                <!-- Import OPML -->
                <form hx-post="/api/feeds/import"
                      hx-target="#main-content"
                      hx-encoding="multipart/form-data" hx-trigger="change">
                    <label class="inline-flex items-center rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50 dark:bg-gray-700 dark:text-white dark:ring-gray-600 dark:hover:bg-gray-600 cursor-pointer">
                        <svg class="-ml-0.5 mr-1.5 h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd"/>
                        </svg>
                        Import
                        <input type="file"
                               name="opmlFile"
                               accept=".opml,.xml"
                               class="hidden"

                               required>
                    </label>
                </form>

                <!-- Export OPML -->
                <a href="/api/feeds/"
                   class="inline-flex items-center rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50 dark:bg-gray-700 dark:text-white dark:ring-gray-600 dark:hover:bg-gray-600">
                    <svg class="-ml-0.5 mr-1.5 h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 13.293a1 1 0 010 1.414l-3-3a1 1 0 011.414-1.414L6 11.586V4a1 1 0 012 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0z" clip-rule="evenodd"/>
                    </svg>
                    Export
                </a>
            </div>
        </div>
    </div>

    <!-- Feed List -->
    <div class="bg-white dark:bg-gray-800 shadow-md rounded-lg overflow-hidden">

        <ul class="divide-y divide-gray-200 dark:divide-gray-700">
            <li th:each="feed : ${feeds}" class="hover:bg-gray-50 dark:hover:bg-gray-700">
                <div class="flex items-center px-4 py-4 sm:px-6">
                    <div class="min-w-0 flex-1 flex items-center">
                        <div class="flex-shrink-0">
                            <img th:if="${feed.icon}" th:src="${feed.icon}"
                                 class="h-12 w-12 rounded-lg object-contain bg-white dark:bg-gray-700"
                                 th:alt="${feed.title + ' icon'}">
                            <div th:unless="${feed.icon}"
                                 class="h-12 w-12 rounded-lg bg-gray-200 dark:bg-gray-600 flex items-center justify-center">
                                <svg class="h-6 w-6 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                          d="M6 5c7.18 0 13 5.82 13 13M6 11a7 7 0 017 7m-6 0a1 1 0 11-2 0 1 1 0 012 0z"/>
                                </svg>
                            </div>
                        </div>
                        <div class="min-w-0 flex-1 px-4">
                            <div class="flex items-center justify-between">
                                <p class="text-sm font-medium text-indigo-600 dark:text-indigo-400 truncate" th:text="${feed.title}">
                                </p>
                                <div class="ml-2 flex-shrink-0 flex">
                                    <p class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 dark:bg-green-800 text-green-800 dark:text-green-100"
                                       th:text="${#lists.size(feed.items)} + ' entries'">
                                    </p>
                                </div>
                            </div>
                            <div class="mt-2" th:if="${not #lists.isEmpty(feed.categories)}">
                                <div th:replace="~{fragments/categories :: category-badges(${feed.categories}, true)}"></div>
                            </div>
                            <div class="mt-2 flex justify-between">
                                <div class="sm:flex">
                                    <p class="flex items-center text-sm text-gray-500 dark:text-gray-400">
                                        <svg class="flex-shrink-0 mr-1.5 h-5 w-5 text-gray-400" viewBox="0 0 20 20" fill="currentColor">
                                            <path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"/>
                                        </svg>
                                        <span class="truncate" th:text="${feed.link}"></span>
                                    </p>
                                </div>
                                <div class="ml-2 flex items-center text-sm text-gray-500 dark:text-gray-400">
                                    <svg class="flex-shrink-0 mr-1.5 h-5 w-5 text-gray-400" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M6 2a1 1 0 00-1 1v1H4a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-1V3a1 1 0 10-2 0v1H7V3a1 1 0 00-1-1zm0 5a1 1 0 000 2h8a1 1 0 100-2H6z" clip-rule="evenodd"/>
                                    </svg>
                                    <p th:text="${#dates.format(feed.publishedDate, 'MMM d, yyyy HH:mm')}">
                                    </p>
                                </div>
                            </div>
                        </div>
                        <div class="ml-4">
                            <button type="button"
                                    th:attr="aria-label=${'View ' + feed.title + ' details'}"
                                    class="inline-flex items-center p-2 border border-transparent rounded-full shadow-sm text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500"
                                    th:hx-get="@{/feeds/{id}(id=${feed.uri})}"
                                    hx-target="#main-content">
                                <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z" clip-rule="evenodd"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </li>
        </ul>
    </div>
</div>

<script>initFlowbite();</script>
