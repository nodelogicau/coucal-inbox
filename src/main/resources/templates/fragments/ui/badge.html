<!--
Thymeleaf fragment for a Flowbite badge.
Parameters:
 - text: badge text (required)
 - color: badge color (optional, default: 'blue')
 - icon: icon class (optional, e.g., 'heroicon-s-check')
 - extraClass: extra CSS classes (optional)
Usage:
 <div th:replace="fragments/ui/badge :: badge('New', 'green', 'heroicon-s-check', 'ml-2')"></div>
-->

<th:block th:fragment="badge(text, color)">
    <span th:text="${text}" th:class="|bg-${color}-100 text-${color}-800 text-xs font-medium me-2 px-2.5 py-0.5 rounded-sm dark:bg-${color}-900 dark:text-${color}-300|"
          class="bg-blue-100 text-blue-800 text-xs font-medium me-2 px-2.5 py-0.5 rounded-sm dark:bg-blue-900 dark:text-blue-300">Default</span>
</th:block>
